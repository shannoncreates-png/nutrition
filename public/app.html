<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Nourish — AI Nutrition Tracker</title>
  <meta name="description" content="Track nutrition by describing what you ate. No barcode scanning, no manual searching — just type or speak and AI does the rest." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"><\/script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08080f; --surface: #0f0f1a; --surface2: #161625; --border: #1e1e35;
      --accent: #7c6aff; --accent2: #a78bfa; --accent3: #06d6a0;
      --accent4: #ff6b6b; --accent5: #ffd166; --accent6: #38bdf8;
      --text: #f0eeff; --text2: #8884aa; --text3: #4a4870;
      --radius: 16px; --radius-sm: 10px;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; padding-bottom: 100px; -webkit-font-smoothing: antialiased; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(8,8,15,0.92); z-index: 1000; display: flex; align-items: flex-end; backdrop-filter: blur(8px); }
    .modal-overlay.hidden { display: none; }
    .modal-sheet { width: 100%; max-width: 480px; margin: 0 auto; background: var(--surface); border-radius: 24px 24px 0 0; padding: 28px 24px calc(32px + env(safe-area-inset-bottom,0px)); border-top: 1px solid var(--border); }
    .modal-pill { width: 36px; height: 4px; background: var(--border); border-radius: 99px; margin: 0 auto 24px; }
    .modal-icon { font-size: 36px; text-align: center; margin-bottom: 12px; }
    .modal-title { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 16px; }
    .disclaimer-points { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .disclaimer-point { display: flex; gap: 10px; align-items: flex-start; background: var(--surface2); border-radius: var(--radius-sm); padding: 12px; border: 1px solid var(--border); font-size: 13px; color: var(--text2); line-height: 1.5; }
    .disclaimer-point strong { color: var(--text); }
    .modal-agree-btn { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: var(--radius-sm); color: white; font-size: 15px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; }

    /* FOLLOW-UP MODAL */
    .followup-sheet { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--surface); border-radius: 24px 24px 0 0; border-top: 1px solid var(--border); padding: 24px 20px calc(24px + env(safe-area-inset-bottom,0px)); z-index: 500; transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1); }
    .followup-sheet.hidden { transform: translateX(-50%) translateY(100%); }
    .followup-title { font-family: 'Space Grotesk', sans-serif; font-size: 17px; font-weight: 600; margin-bottom: 6px; }
    .followup-sub { font-size: 13px; color: var(--text2); margin-bottom: 16px; line-height: 1.5; }
    .followup-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .followup-option { padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; transition: all 0.15s; text-align: left; color: var(--text); font-family: 'Inter', sans-serif; }
    .followup-option:hover, .followup-option.selected { border-color: var(--accent); background: rgba(124,106,255,0.1); color: var(--accent2); }
    .followup-actions { display: flex; gap: 8px; }
    .followup-btn { flex: 1; padding: 12px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; border: none; transition: all 0.15s; }
    .followup-btn.primary { background: var(--accent); color: white; }
    .followup-btn.secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }

    /* NAV */
    .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: rgba(15,15,26,0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; z-index: 100; padding: 8px 0 env(safe-area-inset-bottom,8px); }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 0; background: none; border: none; color: var(--text3); cursor: pointer; font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; transition: color 0.2s; }
    .nav-btn.active { color: var(--accent2); }
    .nav-btn svg { width: 22px; height: 22px; }
    .page { display: none; } .page.active { display: block; }

    /* HEADER */
    .page-header { padding: 56px 20px 16px; background: linear-gradient(180deg, var(--surface) 0%, transparent 100%); }
    .page-title { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
    .page-sub { font-size: 14px; color: var(--text2); margin-top: 4px; }

    /* CALORIES REMAINING BANNER */
    .cal-remaining-banner { margin: 0 20px 16px; border-radius: var(--radius); padding: 16px 18px; display: flex; align-items: center; gap: 16px; border: 1px solid; }
    .cal-remaining-banner.under { background: rgba(124,106,255,0.08); border-color: rgba(124,106,255,0.2); }
    .cal-remaining-banner.over { background: rgba(255,107,107,0.08); border-color: rgba(255,107,107,0.25); }
    .cal-remaining-banner.perfect { background: rgba(6,214,160,0.08); border-color: rgba(6,214,160,0.25); }
    .cal-rem-num { font-family: 'Space Grotesk', sans-serif; font-size: 32px; font-weight: 700; line-height: 1; }
    .cal-rem-lbl { font-size: 12px; color: var(--text2); margin-top: 3px; }
    .cal-rem-detail { font-size: 11px; color: var(--text3); margin-top: 2px; }

    /* RING */
    .today-ring-section { padding: 0 20px 14px; display: flex; align-items: center; gap: 20px; }
    .ring-wrap { position: relative; width: 100px; height: 100px; flex-shrink: 0; }
    .ring-wrap canvas { width: 100px !important; height: 100px !important; }
    .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .ring-cal { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; line-height: 1; }
    .ring-label { font-size: 9px; color: var(--text2); margin-top: 2px; }
    .macro-pills { display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .macro-pill { display: flex; align-items: center; gap: 8px; }
    .macro-bar-wrap { flex: 1; height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .macro-bar { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); }
    .macro-name { font-size: 10px; color: var(--text2); width: 40px; }
    .macro-val { font-size: 10px; font-weight: 600; color: var(--text); width: 46px; text-align: right; }

    /* WATER TRACKER */
    .water-section { margin: 0 20px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
    .water-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .water-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .water-count { font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 700; color: var(--accent6); }
    .water-cups { display: flex; gap: 6px; flex-wrap: wrap; }
    .water-cup { width: 32px; height: 36px; border-radius: 6px; border: 1.5px solid var(--border); background: var(--surface2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.15s; position: relative; overflow: hidden; }
    .water-cup.filled { background: rgba(56,189,248,0.15); border-color: rgba(56,189,248,0.4); }
    .water-cup.filled::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 60%; background: rgba(56,189,248,0.2); }
    .water-cup svg { position: relative; z-index: 1; }
    .water-goal-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    .water-goal-lbl { font-size: 11px; color: var(--text3); flex: 1; }
    .water-goal-val { font-size: 11px; color: var(--accent6); font-weight: 600; }
    .water-bar-wrap { flex: 1; height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .water-bar { height: 100%; background: var(--accent6); border-radius: 99px; transition: width 0.4s ease; }

    /* WARNING PILLS */
    .warning-pills { display: flex; gap: 8px; padding: 0 20px 14px; flex-wrap: wrap; }
    .warning-pill { display: flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; border: 1px solid; }
    .warning-pill.warn { background: rgba(255,107,107,0.1); border-color: rgba(255,107,107,0.3); color: var(--accent4); }
    .warning-pill.good { background: rgba(6,214,160,0.1); border-color: rgba(6,214,160,0.3); color: var(--accent3); }

    /* INPUT */
    .log-section { padding: 0 20px 20px; }
    .input-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color 0.2s; }
    .input-card:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,106,255,0.12); }
    .food-textarea { width: 100%; min-height: 72px; background: none; border: none; outline: none; padding: 14px 16px; font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.6; color: var(--text); resize: none; }
    .food-textarea::placeholder { color: var(--text3); }
    .input-actions { display: flex; align-items: center; padding: 10px 12px; border-top: 1px solid var(--border); gap: 8px; }
    .mic-btn { width: 36px; height: 36px; border-radius: 99px; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
    .mic-btn.recording { background: rgba(255,107,107,0.15); border-color: var(--accent4); color: var(--accent4); animation: pulse-mic 1.2s infinite; }
    @keyframes pulse-mic { 0%,100% { box-shadow: 0 0 0 0 rgba(255,107,107,0.4); } 50% { box-shadow: 0 0 0 8px rgba(255,107,107,0); } }
    .meal-select { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text2); font-size: 13px; padding: 0 10px; height: 36px; font-family: 'Inter', sans-serif; outline: none; cursor: pointer; }
    .log-btn { background: var(--accent); border: none; border-radius: var(--radius-sm); color: white; font-size: 13px; font-weight: 600; padding: 0 16px; height: 36px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
    .log-btn:hover { background: #6b59ee; } .log-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* RESULT CARD */
    .result-card { background: linear-gradient(135deg,rgba(124,106,255,0.1),rgba(6,214,160,0.05)); border: 1px solid rgba(124,106,255,0.25); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .result-name { font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600; margin-bottom: 10px; }
    .result-macros { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 6px; }
    .result-macro { background: var(--surface); border-radius: var(--radius-sm); padding: 8px 6px; text-align: center; }
    .result-macro-val { font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 700; line-height: 1; }
    .result-macro-lbl { font-size: 9px; color: var(--text2); margin-top: 3px; }
    .result-confirm-row { display: flex; gap: 8px; margin-top: 12px; }
    .btn-confirm { flex: 1; padding: 10px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-confirm.primary { background: var(--accent3); color: #08080f; }
    .btn-confirm.secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }

    /* LOG LIST */
    .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); padding: 0 20px; margin-bottom: 10px; }
    .log-list { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; }
    .log-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; display: flex; align-items: center; gap: 12px; animation: slideUp 0.25s ease; }
    .log-item-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .log-item-info { flex: 1; min-width: 0; }
    .log-item-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-item-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .log-item-cal { font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 700; color: var(--accent2); flex-shrink: 0; }
    .log-item-del { width: 28px; height: 28px; border-radius: 8px; background: none; border: 1px solid transparent; color: var(--text3); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
    .log-item-del:hover { border-color: var(--accent4); color: var(--accent4); background: rgba(255,107,107,0.08); }
    .empty-state { text-align: center; padding: 32px 20px; color: var(--text3); font-size: 14px; line-height: 1.6; }
    .empty-state .emoji { font-size: 36px; margin-bottom: 12px; display: block; }
    .meal-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 99px; text-transform: uppercase; letter-spacing: 0.05em; }
    .meal-breakfast { background: rgba(255,209,102,0.15); color: var(--accent5); }
    .meal-lunch { background: rgba(6,214,160,0.15); color: var(--accent3); }
    .meal-dinner { background: rgba(124,106,255,0.15); color: var(--accent2); }
    .meal-snack { background: rgba(255,107,107,0.15); color: var(--accent4); }

    /* HISTORY */
    .history-day { margin-bottom: 24px; }
    .history-day-header { padding: 0 20px; margin-bottom: 10px; display: flex; align-items: baseline; gap: 10px; }
    .history-day-label { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; }
    .history-day-cal { font-size: 13px; color: var(--text2); }

    /* CHARTS */
    .charts-section { padding: 0 20px 20px; }
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
    .chart-card-title { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .chart-card-sub { font-size: 12px; color: var(--text2); margin-bottom: 16px; line-height: 1.5; }
    .chart-wrap { position: relative; height: 180px; }

    /* REPORT CARD */
    .report-card { margin: 0 20px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
    .report-card-title { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; margin-bottom: 14px; }
    .report-grades { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
    .report-grade { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px 8px; text-align: center; border: 1px solid var(--border); }
    .grade-letter { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; line-height: 1; }
    .grade-lbl { font-size: 10px; color: var(--text2); margin-top: 4px; }
    .grade-A { color: #06d6a0; } .grade-B { color: #a78bfa; } .grade-C { color: #ffd166; } .grade-D { color: #ff6b6b; } .grade-F { color: #ff4444; }

    /* TOP FOODS */
    .top-foods { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .top-food-item { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
    .top-food-rank { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; color: var(--text3); width: 24px; flex-shrink: 0; }
    .top-food-info { flex: 1; min-width: 0; }
    .top-food-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .top-food-times { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .top-food-cal { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600; color: var(--accent2); }

    /* FUN */
    .fun-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px 20px; }
    .fun-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; }
    .fun-card-emoji { font-size: 28px; margin-bottom: 8px; display: block; }
    .fun-card-val { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; color: var(--accent2); line-height: 1; }
    .fun-card-lbl { font-size: 11px; color: var(--text2); margin-top: 4px; line-height: 1.4; }

    /* STREAK */
    .streak-banner { margin: 0 20px 16px; background: linear-gradient(135deg,rgba(124,106,255,0.15),rgba(167,139,250,0.08)); border: 1px solid rgba(124,106,255,0.2); border-radius: var(--radius); padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
    .streak-fire { font-size: 28px; }
    .streak-num { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; color: var(--accent2); line-height: 1; }
    .streak-lbl { font-size: 12px; color: var(--text2); margin-top: 2px; }

    /* GOALS */
    .goals-section { padding: 0 20px 20px; }
    .goal-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); gap: 12px; }
    .goal-lbl { font-size: 14px; }
    .goal-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .goal-input { width: 80px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; font-weight: 600; padding: 8px 10px; text-align: right; font-family: 'Inter', sans-serif; outline: none; }
    .goal-input:focus { border-color: var(--accent); }
    .goal-unit { font-size: 12px; color: var(--text2); width: 28px; }
    .data-actions { display: flex; gap: 10px; margin-bottom: 20px; }
    .data-btn { flex: 1; padding: 12px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; font-family: 'Inter', sans-serif; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); display: flex; align-items: center; justify-content: center; gap: 6px; }
    .data-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    /* TOAST */
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; padding: 10px 20px; font-size: 13px; font-weight: 500; white-space: nowrap; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 999; max-width: calc(100% - 40px); }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .no-data { text-align: center; padding: 32px 20px; color: var(--text3); font-size: 14px; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }
  </style>
</head>
<body>

<!-- DISCLAIMER MODAL -->
<div class="modal-overlay" id="disclaimer-modal">
  <div class="modal-sheet">
    <div class="modal-pill"></div>
    <div class="modal-icon">🥗</div>
    <div class="modal-title">Before you start</div>
    <div class="disclaimer-points">
      <div class="disclaimer-point"><span style="font-size:16px;flex-shrink:0">🤖</span><span><strong>AI estimates only.</strong> Nutritional values are generated by AI and are approximations based on typical portions. They may not be exact.</span></div>
      <div class="disclaimer-point"><span style="font-size:16px;flex-shrink:0">👨‍⚕️</span><span><strong>Not medical advice.</strong> Nourish is a personal tracking tool, not a substitute for a doctor, dietitian, or healthcare professional.</span></div>
      <div class="disclaimer-point"><span style="font-size:16px;flex-shrink:0">📊</span><span><strong>For awareness only.</strong> Use this to build general awareness of your eating habits — not to diagnose or treat any health condition.</span></div>
      <div class="disclaimer-point"><span style="font-size:16px;flex-shrink:0">💾</span><span><strong>Data stays on your device.</strong> Your log is stored locally in your browser. Export a backup from the Goals tab regularly.</span></div>
    </div>
    <button class="modal-agree-btn" onclick="agreeDisclaimer()">I understand — let's go</button>
  </div>
</div>

<!-- FOLLOW-UP PORTION SHEET -->
<div class="followup-sheet hidden" id="followup-sheet">
  <div class="modal-pill"></div>
  <div class="followup-title" id="followup-title">One quick question</div>
  <div class="followup-sub" id="followup-sub">How much did you have?</div>
  <div class="followup-options" id="followup-options"></div>

<script>
const STORAGE_KEY='nourish_log_v4', GOALS_KEY='nourish_goals_v3', DISC_KEY='nourish_disc_v1', WATER_KEY='nourish_water_v1';
function getLog(){ try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');}catch(e){return[];} }
function saveLog(l){ localStorage.setItem(STORAGE_KEY,JSON.stringify(l)); }
function getGoals(){ try{return JSON.parse(localStorage.getItem(GOALS_KEY)||'null')||{cal:2000,protein:150,carbs:250,fat:65,fibre:30,sugar:25,sodium:2300,water:8};}catch(e){return{cal:2000,protein:150,carbs:250,fat:65,fibre:30,sugar:25,sodium:2300,water:8};} }
const todayKey=()=>new Date().toISOString().slice(0,10);

// WATER
function getWaterLog(){ try{return JSON.parse(localStorage.getItem(WATER_KEY)||'{}');}catch(e){return{};} }
function saveWaterLog(w){ localStorage.setItem(WATER_KEY,JSON.stringify(w)); }
function getTodayWater(){ return getWaterLog()[todayKey()]||0; }
function setTodayWater(n){ const w=getWaterLog(); w[todayKey()]=n; saveWaterLog(w); }

function renderWater(){
  const goals=getGoals(), cups=getTodayWater(), goal=goals.water||8;
  document.getElementById('water-count').textContent=cups;
  document.getElementById('water-goal-display').textContent=goal;
  const pct=Math.min(cups/goal*100,100);
  document.getElementById('water-bar').style.width=pct+'%';
  document.getElementById('water-pct').textContent=Math.round(pct)+'%';
  const wrap=document.getElementById('water-cups');
  wrap.innerHTML='';
  for(let i=0;i<goal;i++){
    const btn=document.createElement('button');
    btn.className='water-cup'+(i<cups?' filled':'');
    btn.innerHTML=`<svg width="14" height="18" viewBox="0 0 24 28" fill="${i<cups?'#38bdf8':'#4a4870'}" xmlns="http://www.w3.org/2000/svg"><path d="M4 2h16l-2 22H6L4 2z"/></svg>`;
    btn.onclick=()=>{
      const cur=getTodayWater();
      if(i<cur){ setTodayWater(i); }
      else { setTodayWater(i+1); if(i+1>=goal)showToast('💧 Daily water goal hit!'); }
      renderWater();
    };
    wrap.appendChild(btn);
  }
}

// DISCLAIMER
function agreeDisclaimer(){ localStorage.setItem(DISC_KEY,'1'); document.getElementById('disclaimer-modal').classList.add('hidden'); }
if(localStorage.getItem(DISC_KEY)) document.getElementById('disclaimer-modal').classList.add('hidden');

// NAV
function showPage(name,btn){ document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); document.getElementById('page-'+name).classList.add('active'); if(btn)btn.classList.add('active'); if(name==='charts')renderCharts(); if(name==='history')renderHistory(); if(name==='today')renderToday(); if(name==='goals')loadGoalInputs(); }
function showToast(msg,dur=2500){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),dur); }

// RING
let ringInst=null;
function renderRing(cal,goal){ const pct=Math.min(cal/goal,1),color=pct>=1?'#ff6b6b':'#7c6aff',ctx=document.getElementById('ringChart').getContext('2d'); if(ringInst)ringInst.destroy(); ringInst=new Chart(ctx,{type:'doughnut',data:{datasets:[{data:[pct,Math.max(0,1-pct)],backgroundColor:[color,'#1e1e35'],borderWidth:0,borderRadius:99}]},options:{cutout:'78%',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},animation:{duration:700,easing:'easeOutQuart'}}}); }

// CALORIES REMAINING BANNER
function renderCalBanner(eaten, goal){
  const rem = goal - eaten;
  const banner = document.getElementById('cal-banner');
  const numEl = document.getElementById('cal-rem-num');
  const lblEl = document.getElementById('cal-rem-lbl');
  const detailEl = document.getElementById('cal-rem-detail');
  const emojiEl = document.getElementById('cal-rem-emoji');
  if(eaten === 0){
    numEl.textContent = goal;
    lblEl.textContent = 'calories remaining';
    detailEl.textContent = 'Log your first meal to start';
    emojiEl.textContent = '🍽️';
    banner.className = 'cal-remaining-banner under';
    numEl.style.color = 'var(--accent2)';
  } else if(rem > 200){
    numEl.textContent = Math.round(rem);
    lblEl.textContent = 'calories remaining';
    detailEl.textContent = `${Math.round(eaten)} eaten of ${goal} goal`;
    emojiEl.textContent = '✅';
    banner.className = 'cal-remaining-banner under';
    numEl.style.color = 'var(--accent2)';
  } else if(rem >= 0){
    numEl.textContent = Math.round(rem);
    lblEl.textContent = 'calories remaining';
    detailEl.textContent = 'Almost at your goal — choose wisely';
    emojiEl.textContent = '⚠️';
    banner.className = 'cal-remaining-banner perfect';
    numEl.style.color = 'var(--accent3)';
  } else {
    numEl.textContent = Math.round(Math.abs(rem));
    lblEl.textContent = 'calories over goal';
    detailEl.textContent = `${Math.round(eaten)} eaten — ${Math.abs(Math.round(rem))} over`;
    emojiEl.textContent = '🔴';
    banner.className = 'cal-remaining-banner over';
    numEl.style.color = 'var(--accent4)';
  }
}

function renderWarnings(t,g){ const pills=[]; if(t.sugar>g.sugar)pills.push({type:'warn',text:`🍬 Sugar over by ${Math.round(t.sugar-g.sugar)}g`}); if(t.sodium>g.sodium)pills.push({type:'warn',text:`🧂 Sodium over by ${Math.round(t.sodium-g.sodium)}mg`}); if(t.fibre<g.fibre*0.5&&t.cal>500)pills.push({type:'warn',text:`🌿 Fibre low — add veg or legumes`}); if(t.protein>=g.protein)pills.push({type:'good',text:`💪 Protein goal hit!`}); if(t.fibre>=g.fibre)pills.push({type:'good',text:`✅ Fibre goal hit!`}); document.getElementById('warning-pills').innerHTML=pills.map(p=>`<div class="warning-pill ${p.type}">${p.text}</div>`).join(''); }
function mealEmoji(m){return{breakfast:'🌅',lunch:'☀️',dinner:'🌙',snack:'🍎'}[m]||'🍽️';}

function renderToday(){
  const log=getLog(),goals=getGoals(),today=todayKey(),items=log.filter(e=>e.date===today);
  const zero={cal:0,protein:0,carbs:0,fat:0,fibre:0,sugar:0,sodium:0};
  const t=items.reduce((a,e)=>({cal:a.cal+e.cal,protein:a.protein+e.protein,carbs:a.carbs+e.carbs,fat:a.fat+e.fat,fibre:a.fibre+(e.fibre||0),sugar:a.sugar+(e.sugar||0),sodium:a.sodium+(e.sodium||0)}),zero);
  document.getElementById('today-date-label').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const streak=calcStreak();
  document.getElementById('streak-mini').innerHTML=streak>0?`🔥 ${streak} day${streak>1?'s':''}`:'';
  renderCalBanner(t.cal, goals.cal);
  renderRing(t.cal,goals.cal);
  document.getElementById('ring-cal').textContent=Math.round(t.cal);
  [['protein',t.protein,goals.protein,'g'],['carbs',t.carbs,goals.carbs,'g'],['fat',t.fat,goals.fat,'g'],['fibre',t.fibre,goals.fibre,'g'],['sugar',t.sugar,goals.sugar,'g'],['sodium',t.sodium,goals.sodium,'mg']].forEach(([k,val,goal,unit])=>{ const el=document.getElementById('bar-'+k); el.style.width=Math.min(val/goal*100,100)+'%'; if(val>goal&&(k==='sugar'||k==='sodium'))el.style.background='#ff6b6b'; document.getElementById('val-'+k).textContent=Math.round(val)+unit; });
  renderWarnings(t,goals);
  renderWater();
  const listEl=document.getElementById('today-log');
  if(!items.length){listEl.innerHTML=`<div class="empty-state"><span class="emoji">🥗</span>Nothing logged yet.<br>Describe your first meal above.</div>`;return;}
  listEl.innerHTML=items.slice().reverse().map(e=>`<div class="log-item"><div class="log-item-icon" style="background:rgba(124,106,255,0.1)">${e.emoji||mealEmoji(e.meal)}</div><div class="log-item-info"><div class="log-item-name">${e.name}</div><div class="log-item-meta"><span class="meal-badge meal-${e.meal}">${e.meal}</span> P${Math.round(e.protein)}g · C${Math.round(e.carbs)}g · F${Math.round(e.fat)}g${e.sugar?` · 🍬${Math.round(e.sugar)}g`:''}</div></div><div class="log-item-cal">${Math.round(e.cal)}</div><button class="log-item-del" onclick="deleteEntry('${e.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg></button></div>`).join('');
}

function deleteEntry(id){ saveLog(getLog().filter(e=>e.id!==id)); renderToday(); showToast('Entry removed'); }

// FOLLOW-UP PORTION SYSTEM
let pendingEntry=null, selectedPortionMultiplier=1;

function showFollowUp(entry, questions){
  pendingEntry = entry;
  selectedPortionMultiplier = 1;
  document.getElementById('followup-title').textContent = `How much ${entry.name.toLowerCase()}?`;
  document.getElementById('followup-sub').textContent = `I assumed a standard portion — tap to adjust if needed.`;
  const opts = document.getElementById('followup-options');
  opts.innerHTML = questions.map((q,i) => `<button class="followup-option${i===1?' selected':''}" onclick="selectPortion(this, ${q.multiplier})">${q.label} <span style="color:var(--text3);font-size:12px">≈ ${Math.round(entry.cal * q.multiplier)} kcal</span></button>`).join('');
  selectedPortionMultiplier = questions[1] ? questions[1].multiplier : 1;
  document.getElementById('followup-sheet').classList.remove('hidden');
}

function selectPortion(el, multiplier){
  document.querySelectorAll('.followup-option').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  selectedPortionMultiplier = multiplier;
}

function confirmFollowUp(){
  if(!pendingEntry) return;
  const m = selectedPortionMultiplier;
  const e = pendingEntry;
  const adjusted = {
    ...e,
    cal: e.cal * m, protein: e.protein * m, carbs: e.carbs * m,
    fat: e.fat * m, fibre: e.fibre * m, sugar: e.sugar * m, sodium: e.sodium * m
  };
  const log = getLog(); log.push(adjusted); saveLog(log);
  pendingEntry = null;
  document.getElementById('followup-sheet').classList.add('hidden');
  document.getElementById('result-area').innerHTML = '';
  document.getElementById('food-input').value = '';
  renderToday();
  showToast('✓ Added to your log');
}

function skipFollowUp(){
  if(!pendingEntry) return;
  const log = getLog(); log.push(pendingEntry); saveLog(log);
  pendingEntry = null;
  document.getElementById('followup-sheet').classList.add('hidden');
  document.getElementById('result-area').innerHTML = '';
  document.getElementById('food-input').value = '';
  renderToday();
  showToast('✓ Added to your log');
}

function cancelEntry(){
  pendingEntry = null;
  document.getElementById('result-area').innerHTML = '';
  document.getElementById('followup-sheet').classList.add('hidden');
}

// AI ANALYSIS — calls secure backend proxy, never exposes the API key
async function analyseFood(){
  const input=document.getElementById('food-input').value.trim();
  if(!input){showToast('Describe what you ate first');return;}
  const btn=document.getElementById('log-btn'),btnText=document.getElementById('log-btn-text');
  btn.disabled=true; btnText.innerHTML='<span class="spinner"></span>';
  document.getElementById('result-area').innerHTML='';
  document.getElementById('followup-sheet').classList.add('hidden');

  try{
    const res=await fetch('/api/analyse',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({food:input})
    });

    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      throw new Error(err.error||`Server error ${res.status}`);
    }

    const data=await res.json();
    const raw=data.content[0].text.trim().replace(/```json|```/g,'').trim();
    const n=JSON.parse(raw);

    pendingEntry={
      id:Date.now().toString(), date:todayKey(), time:new Date().toISOString(),
      meal:document.getElementById('meal-select').value,
      input, name:n.name, emoji:n.emoji||'🍽️',
      cal:n.cal, protein:n.protein, carbs:n.carbs, fat:n.fat,
      fibre:n.fibre||0, sugar:n.sugar||0, sodium:n.sodium||0, note:n.note||''
    };

    const alerts=[
      n.sugar>20?`<div style="font-size:11px;color:#f97316;margin-top:6px">🍬 High sugar — ${Math.round(n.sugar)}g</div>`:'',
      n.sodium>800?`<div style="font-size:11px;color:#38bdf8;margin-top:4px">🧂 High sodium — ${Math.round(n.sodium)}mg</div>`:'',
      n.fibre>5?`<div style="font-size:11px;color:#06d6a0;margin-top:4px">✅ Good fibre source — ${Math.round(n.fibre)}g</div>`:''
    ].join('');

    document.getElementById('result-area').innerHTML=`
      <div class="result-card">
        <div class="result-name">${n.emoji} ${n.name}</div>
        ${n.note?`<div style="font-size:12px;color:var(--text2);margin-bottom:10px">${n.note}</div>`:''}
        <div class="result-macros">
          <div class="result-macro"><div class="result-macro-val" style="color:#7c6aff">${Math.round(n.cal)}</div><div class="result-macro-lbl">kcal</div></div>
          <div class="result-macro"><div class="result-macro-val" style="color:#a78bfa">${Math.round(n.protein)}g</div><div class="result-macro-lbl">protein</div></div>
          <div class="result-macro"><div class="result-macro-val" style="color:#06d6a0">${Math.round(n.carbs)}g</div><div class="result-macro-lbl">carbs</div></div>
          <div class="result-macro"><div class="result-macro-val" style="color:#ffd166">${Math.round(n.fat)}g</div><div class="result-macro-lbl">fat</div></div>
        </div>
        <div class="result-macros" style="margin-top:6px">
          <div class="result-macro"><div class="result-macro-val" style="color:#ff6b6b">${Math.round(n.fibre)}g</div><div class="result-macro-lbl">fibre</div></div>
          <div class="result-macro"><div class="result-macro-val" style="color:#f97316">${Math.round(n.sugar)}g</div><div class="result-macro-lbl">sugar</div></div>
          <div class="result-macro"><div class="result-macro-val" style="color:#38bdf8">${Math.round(n.sodium)}</div><div class="result-macro-lbl">sodium mg</div></div>
          <div class="result-macro"><div class="result-macro-val" style="color:#a78bfa">${n.cal>0?Math.round((n.protein*4/n.cal)*100):0}%</div><div class="result-macro-lbl">protein%</div></div>
        </div>
        ${alerts}
        <div class="result-confirm-row">
          <button class="btn-confirm primary" onclick="proceedToPortionCheck()">Confirm portion →</button>
          <button class="btn-confirm secondary" onclick="cancelEntry()">Discard</button>
        </div>
      </div>`;

    pendingEntry._portionOptions = n.portionQuestion ? n.portionQuestion.options : [
      {label:'Small / half portion', multiplier:0.5},
      {label:'Standard portion', multiplier:1.0},
      {label:'Large / double', multiplier:1.5},
      {label:'Extra large / triple', multiplier:2.0}
    ];

  }catch(err){showToast('Could not analyse — try again');console.error(err);}
  btn.disabled=false; btnText.textContent='Analyse';
}

function proceedToPortionCheck(){
  if(!pendingEntry) return;
  showFollowUp(pendingEntry, pendingEntry._portionOptions);
}

// VOICE
let recog=null,isRec=false;
function setupVoice(){ const SR=window.SpeechRecognition||window.webkitSpeechRecognition,btn=document.getElementById('mic-btn'); if(!SR){btn.style.opacity='0.3';return;} recog=new SR();recog.continuous=false;recog.interimResults=true;recog.lang='en-US'; recog.onresult=e=>{document.getElementById('food-input').value=Array.from(e.results).map(r=>r[0].transcript).join('');}; recog.onend=()=>{isRec=false;btn.classList.remove('recording');}; recog.onerror=()=>{isRec=false;btn.classList.remove('recording');showToast('Voice error');}; btn.onclick=()=>{if(isRec){recog.stop();return;}isRec=true;btn.classList.add('recording');recog.start();showToast('🎤 Listening…');}; }

// HISTORY
function renderHistory(){ const log=getLog(),el=document.getElementById('history-content'); if(!log.length){el.innerHTML='<div class="no-data">No history yet.<br>Start logging on Today.</div>';return;} const byDay={}; log.forEach(e=>{if(!byDay[e.date])byDay[e.date]=[];byDay[e.date].push(e);}); el.innerHTML=Object.keys(byDay).sort().reverse().map(day=>{ const items=byDay[day],totalCal=items.reduce((a,e)=>a+e.cal,0),water=getWaterLog()[day]||0; return `<div class="history-day"><div class="history-day-header"><div class="history-day-label">${formatDayLabel(day)}</div><div class="history-day-cal">${Math.round(totalCal)} kcal · 💧${water}</div></div><div class="log-list">${items.slice().reverse().map(e=>`<div class="log-item"><div class="log-item-icon" style="background:rgba(124,106,255,0.08)">${e.emoji||mealEmoji(e.meal)}</div><div class="log-item-info"><div class="log-item-name">${e.name}</div><div class="log-item-meta"><span class="meal-badge meal-${e.meal}">${e.meal}</span> P${Math.round(e.protein)}g · C${Math.round(e.carbs)}g · F${Math.round(e.fat)}g${e.sugar?` · 🍬${Math.round(e.sugar)}g`:''}</div></div><div class="log-item-cal">${Math.round(e.cal)}</div><button class="log-item-del" onclick="deleteEntry('${e.id}');renderHistory()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg></button></div>`).join('')}</div></div>`; }).join(''); }
function formatDayLabel(ds){ const d=new Date(ds+'T12:00:00'),today=new Date();today.setHours(12,0,0,0);const diff=Math.round((today-d)/86400000);if(diff===0)return'Today';if(diff===1)return'Yesterday';return d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'}); }

// STREAK
function calcStreak(){ const log=getLog();if(!log.length)return 0;const days=[...new Set(log.map(e=>e.date))].sort().reverse(),today=todayKey();if(days[0]!==today&&days[0]!==prevDay(today))return 0;let s=1,c=days[0];for(let i=1;i<days.length;i++){if(days[i]===prevDay(c)){s++;c=days[i];}else break;}return s; }
function prevDay(ds){ const d=new Date(ds+'T12:00:00');d.setDate(d.getDate()-1);return d.toISOString().slice(0,10); }
function calcGrade(val,goal,higher=false){ const r=val/goal;if(higher){if(r>=0.95)return'A';if(r>=0.7)return'B';if(r>=0.5)return'C';if(r>=0.25)return'D';return'F';}else{if(r<=1.0)return'A';if(r<=1.15)return'B';if(r<=1.3)return'C';if(r<=1.5)return'D';return'F';} }

function renderReportCard(wi,goals){ const el=document.getElementById('report-card');if(!wi.length){el.innerHTML='';return;} const d=[...new Set(wi.map(e=>e.date))].length||1; const avg={cal:wi.reduce((a,e)=>a+e.cal,0)/d,protein:wi.reduce((a,e)=>a+e.protein,0)/d,fibre:wi.reduce((a,e)=>a+(e.fibre||0),0)/d,sugar:wi.reduce((a,e)=>a+(e.sugar||0),0)/d,sodium:wi.reduce((a,e)=>a+(e.sodium||0),0)/d}; const wl=getWaterLog(),days7=getLast7();const avgWater=days7.reduce((a,d)=>a+(wl[d]||0),0)/7; const grades=[{label:'Calories',grade:calcGrade(avg.cal,goals.cal,false)},{label:'Protein',grade:calcGrade(avg.protein,goals.protein,true)},{label:'Fibre',grade:calcGrade(avg.fibre,goals.fibre,true)},{label:'Sugar',grade:calcGrade(avg.sugar,goals.sugar,false)},{label:'Sodium',grade:calcGrade(avg.sodium,goals.sodium,false)},{label:'💧 Water',grade:calcGrade(avgWater,goals.water||8,true)}]; el.innerHTML=`<div class="report-card-title">📋 This week's report card</div><div class="report-grades">${grades.map(g=>`<div class="report-grade"><div class="grade-letter grade-${g.grade}">${g.grade}</div><div class="grade-lbl">${g.label}</div></div>`).join('')}</div>`; }

function renderTopFoods(wi){ const el=document.getElementById('top-foods');if(!wi.length){el.innerHTML='<div class="no-data" style="padding:0 0 8px">Log meals to see your top foods.</div>';return;} const counts={};wi.forEach(e=>{const k=e.name.toLowerCase();if(!counts[k])counts[k]={name:e.name,emoji:e.emoji||'🍽️',count:0,totalCal:0};counts[k].count++;counts[k].totalCal+=e.cal;}); el.innerHTML=Object.values(counts).sort((a,b)=>b.count-a.count).slice(0,5).map((f,i)=>`<div class="top-food-item"><div class="top-food-rank">${['🥇','🥈','🥉','4','5'][i]}</div><div style="font-size:20px">${f.emoji}</div><div class="top-food-info"><div class="top-food-name">${f.name}</div><div class="top-food-times">Logged ${f.count}× this week</div></div><div class="top-food-cal">${Math.round(f.totalCal/f.count)} kcal avg</div></div>`).join(''); }

function getLast7(){ const d=[];for(let i=6;i>=0;i--){const x=new Date();x.setDate(x.getDate()-i);d.push(x.toISOString().slice(0,10));}return d; }

let calInst=null,macroInst=null,sfInst=null,waterInst=null;
const CD={plugins:{legend:{display:false},tooltip:{backgroundColor:'#0f0f1a',borderColor:'#1e1e35',borderWidth:1,titleColor:'#f0eeff',bodyColor:'#8884aa'}},scales:{x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#8884aa',font:{size:11}}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#8884aa',font:{size:11}},beginAtZero:true}}};

function renderCharts(){
  const log=getLog(),goals=getGoals(),days=getLast7(),streak=calcStreak(),wi=log.filter(e=>days.includes(e.date)),d=[...new Set(wi.map(e=>e.date))].length||1;
  document.getElementById('streak-banner-wrap').innerHTML=streak>0?`<div class="streak-banner"><div class="streak-fire">🔥</div><div><div class="streak-num">${streak} day streak</div><div class="streak-lbl">Keep logging to maintain it</div></div></div>`:'';
  renderReportCard(wi,goals); renderTopFoods(wi);
  const calData=days.map(d=>log.filter(e=>e.date===d).reduce((a,e)=>a+e.cal,0));
  const labels7=days.map(d=>new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'}));
  if(calInst)calInst.destroy();
  calInst=new Chart(document.getElementById('calChart').getContext('2d'),{type:'bar',data:{labels:labels7,datasets:[{label:'Calories',data:calData,backgroundColor:calData.map(v=>v>=goals.cal?'rgba(255,107,107,0.7)':'rgba(124,106,255,0.7)'),borderRadius:8,borderSkipped:false},{label:'Goal',data:Array(7).fill(goals.cal),type:'line',borderColor:'rgba(167,139,250,0.4)',borderDash:[4,4],borderWidth:1.5,pointRadius:0,fill:false}]},options:{responsive:true,maintainAspectRatio:false,...CD,plugins:{...CD.plugins,tooltip:{...CD.plugins.tooltip,callbacks:{label:ctx=>`${Math.round(ctx.raw)} kcal`}}}}});
  const avgP=wi.reduce((a,e)=>a+e.protein,0)/d,avgC=wi.reduce((a,e)=>a+e.carbs,0)/d,avgF=wi.reduce((a,e)=>a+e.fat,0)/d;
  if(macroInst)macroInst.destroy();
  macroInst=new Chart(document.getElementById('macroChart').getContext('2d'),{type:'doughnut',data:{labels:['Protein','Carbs','Fat'],datasets:[{data:[Math.round(avgP*4),Math.round(avgC*4),Math.round(avgF*9)],backgroundColor:['#a78bfa','#06d6a0','#ffd166'],borderWidth:0,borderRadius:4}]},options:{cutout:'65%',responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#8884aa',font:{size:11},padding:10,boxWidth:10}},tooltip:{backgroundColor:'#0f0f1a',borderColor:'#1e1e35',borderWidth:1,titleColor:'#f0eeff',bodyColor:'#8884aa',callbacks:{label:ctx=>`${ctx.raw} kcal`}}}}});
  const avgS=wi.reduce((a,e)=>a+(e.sugar||0),0)/d,avgFi=wi.reduce((a,e)=>a+(e.fibre||0),0)/d;
  if(sfInst)sfInst.destroy();
  sfInst=new Chart(document.getElementById('sugarFibreChart').getContext('2d'),{type:'bar',data:{labels:['Your Sugar','Sugar Goal','Your Fibre','Fibre Goal'],datasets:[{data:[Math.round(avgS),goals.sugar,Math.round(avgFi),goals.fibre],backgroundColor:['rgba(249,115,22,0.8)','rgba(249,115,22,0.2)','rgba(255,107,107,0.8)','rgba(255,107,107,0.2)'],borderRadius:8,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,...CD,plugins:{...CD.plugins,tooltip:{...CD.plugins.tooltip,callbacks:{label:ctx=>`${ctx.raw}g`}}}}});
  const wl=getWaterLog(),waterData=days.map(d=>wl[d]||0),waterGoal=goals.water||8;
  if(waterInst)waterInst.destroy();
  waterInst=new Chart(document.getElementById('waterChart').getContext('2d'),{type:'bar',data:{labels:labels7,datasets:[{label:'Cups',data:waterData,backgroundColor:waterData.map(v=>v>=waterGoal?'rgba(56,189,248,0.8)':'rgba(56,189,248,0.4)'),borderRadius:8,borderSkipped:false},{label:'Goal',data:Array(7).fill(waterGoal),type:'line',borderColor:'rgba(56,189,248,0.4)',borderDash:[4,4],borderWidth:1.5,pointRadius:0,fill:false}]},options:{responsive:true,maintainAspectRatio:false,...CD,plugins:{...CD.plugins,tooltip:{...CD.plugins.tooltip,callbacks:{label:ctx=>`${ctx.raw} cups`}}}}});
  const tc=wi.reduce((a,e)=>a+e.cal,0),tp=wi.reduce((a,e)=>a+e.protein,0),ts=wi.reduce((a,e)=>a+(e.sugar||0),0),ac=tc/d;
  document.getElementById('fun-grid').innerHTML=(tc>0?[{emoji:'🍕',val:(ac/285).toFixed(1),lbl:'pizza slices of energy per day'},{emoji:'🏃',val:Math.round(ac/70),lbl:'minutes of running to burn daily avg'},{emoji:'🍫',val:(ts/22).toFixed(1),lbl:'chocolate bars worth of sugar this week'},{emoji:'🧂',val:(wi.reduce((a,e)=>a+(e.sodium||0),0)/2300/d).toFixed(1),lbl:'days of sodium in your daily average'},{emoji:'⚡',val:((ac*4184)/3600000).toFixed(2),lbl:'kWh per day (like 30× phone charges)'},{emoji:'🐄',val:(tp/28).toFixed(0),lbl:'quarter-pounders of protein this week'}]:[{emoji:'🍕',val:'?',lbl:'pizza slices'},{emoji:'🏃',val:'?',lbl:'running minutes'},{emoji:'🍫',val:'?',lbl:'chocolate bars'},{emoji:'🧂',val:'?',lbl:'sodium days'},{emoji:'⚡',val:'?',lbl:'kWh'},{emoji:'🐄',val:'?',lbl:'quarter-pounders'}]).map(c=>`<div class="fun-card"><span class="fun-card-emoji">${c.emoji}</span><div class="fun-card-val">${c.val}</div><div class="fun-card-lbl">${c.lbl}</div></div>`).join('');
}

// GOALS
function loadGoalInputs(){ const g=getGoals();['cal','protein','carbs','fat','fibre','sugar','sodium','water'].forEach(k=>{ const el=document.getElementById('goal-'+k); if(el)el.value=g[k]||''; }); }
function saveGoals(){ const keys=['cal','protein','carbs','fat','fibre','sugar','sodium','water'],goals={};keys.forEach(k=>goals[k]=Number(document.getElementById('goal-'+k).value)||0);localStorage.setItem(GOALS_KEY,JSON.stringify(goals));showToast('✓ Goals saved');renderToday(); }
function clearAllData(){ if(!confirm('Clear all meals, water and history? Cannot be undone.'))return;localStorage.removeItem(STORAGE_KEY);localStorage.removeItem(WATER_KEY);showToast('All data cleared');renderToday(); }
function exportData(){ const data={log:getLog(),goals:getGoals(),water:getWaterLog(),exported:new Date().toISOString()},blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=`nourish-backup-${todayKey()}.json`;a.click();URL.revokeObjectURL(url);showToast('✓ Backup downloaded'); }
function importData(e){ const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(data.log)saveLog(data.log);if(data.goals)localStorage.setItem(GOALS_KEY,JSON.stringify(data.goals));if(data.water)saveWaterLog(data.water);showToast('✓ Data restored');renderToday();}catch(err){showToast('Could not read backup file');}};reader.readAsText(file);e.target.value=''; }

document.getElementById('log-btn').addEventListener('click',analyseFood);
document.getElementById('food-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))analyseFood();});
setupVoice();
renderToday();
